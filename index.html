<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CED Dijital Kart</title>

  <style>
    :root{
      --gold:#D4AF37; --bg:#000; --card:#111; --muted:#d6d6d6;
    }
    *{box-sizing:border-box}

    body{
      margin:0; min-height:100vh;
      background: radial-gradient(1200px 800px at 50% 0%, rgba(212,175,55,.12), transparent 60%), var(--bg);
      color:var(--gold);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,Helvetica,sans-serif;
      display:flex; justify-content:center; align-items:center; padding:24px;
    }

    .card{
      width:min(380px,92vw);
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,0)), var(--card);
      border:1px solid rgba(212,175,55,.25);
      border-radius:24px;
      padding:28px 22px 22px;
      text-align:center;
      box-shadow:0 18px 60px rgba(0,0,0,.55);
      position:relative; overflow:hidden;
    }

    .glow{
      position:absolute; inset:-120px;
      background: radial-gradient(circle at 50% 20%, rgba(212,175,55,.22), transparent 55%);
    }

    .avatar{
      width:140px; height:140px; border-radius:999px;
      object-fit:cover;
      border:3px solid var(--gold);
    }

    h1{margin:14px 0 6px; font-size:22px;}
    .title{margin:0 0 14px; color:var(--muted); font-size:14px;}

    .row{
      display:flex; justify-content:center;
      margin:10px 0;
    }

    .row a{
      color:var(--gold);
      text-decoration:none;
      font-weight:600;
    }

    .divider{
      height:1px;
      background:rgba(212,175,55,.18);
      margin:16px 0;
    }

    .btns{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .btn{
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(212,175,55,.35);
      background:rgba(212,175,55,.10);
      color:var(--gold);
      text-decoration:none;
      font-weight:700;
    }

    .btn.full{grid-column:1/-1;}
    .btn.secondary{
      background:rgba(255,255,255,.05);
      color:#fff;
    }

    .iban-box{
      margin-top:18px;
      padding:14px;
      border:1px solid rgba(212,175,55,.35);
      border-radius:16px;
      background:rgba(255,255,255,.04);
      text-align:left;
    }

    .iban-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }

    button{
      background:#D4AF37;
      border:none;
      padding:6px 10px;
      border-radius:8px;
      font-weight:600;
      cursor:pointer;
    }

    .foot{
      margin-top:14px;
      font-size:12px;
      color:#888;
    }
  </style>
</head>
